no_inherit = true
include = ["*.md", "**/*.md"]
exclude = [
  "**/node_modules/**",
  "**/dist/**",
  ".claude/skills/**",
  ".github/copilot-instructions.md",
  "AGENT.md",
  "CLAUDE.md",
  "GEMINI.md",
  "WARP.md",
  "packages/fedify/src/cfworkers/**",
